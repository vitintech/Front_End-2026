<!DOCTYPE html>

<html>
    <head>
        <title>Calculo da Temperatura</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <div class="container">
            <h1>Conversor de temperatura</h1>

            <div class="campo">
                <label>Celsius (°C)</label>

                <input
                    type="number"
                    id="celsius"
                    step="0.1"
                >
            </div>

            <div class="campo">
                <label>Fahrenheit (°F)</label>

                <input
                    type="number"
                    id="fahrenheit"
                    step="0.1"
                >
            </div>

        </div>

        <script src="script.js"></script>
    </body>
</html>
