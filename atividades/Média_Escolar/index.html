<!DOCTYPE html>

<html>
    <head>
        <title>Média Escolar</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>

    <div class="container">

        <h1>Sistema Acadêmico</h1>

        <input
            type="text"
            id="nome"
            placeholder="Nome do aluno"
        >

        <input
            type="number"
            id="nota1"
            placeholder="Nota 1"
            step="0.1"
        >

        <input
            type="number"
            id="nota2"
            placeholder="Nota 2"
            step="0.1"
        >

        <input
            type="number"
            id="nota3"
            placeholder="Nota 3"
            step="0.1"
        >

        <button id="btnCalcular">Calcular Média</button>
        
        <div id="resultado"></div>

    </div>

    <script src="script.js"></script>

    </body>
</html>
